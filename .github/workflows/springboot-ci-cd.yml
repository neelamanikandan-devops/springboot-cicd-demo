name: Enterprise CI-CD Pipeline

on:
  push:
    branches:
      - uat
      - main

  pull_request:
    branches:
      - uat
      - main


env:
  IMAGE_NAME: my-app


jobs:

  build-test-sonar:
    name: Build Test Sonar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Build, Test and Package
        run: mvn clean verify

      - name: SonarQube Analysis
        run: |
          mvn sonar:sonar \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.java.binaries=target/classes

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar


  compliance-check:
    name: Compliance Gate
    needs: build-test-sonar
    runs-on: ubuntu-latest

    steps:
      - name: Compliance Validation
        run: |
          echo "License check passed"
          echo "Dependency check passed"
          echo "Security check passed"


  docker-build-push:
    name: Docker Build and Push
    needs: compliance-check
    runs-on: ubuntu-latest

    if: github.event_name == 'push'

    outputs:
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target

      - name: Verify Artifact
        run: ls -la target

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate Image Tag
        id: meta
        run: echo "tag=${GITHUB_REF_NAME}-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }} .

      - name: Push Docker Image
        run: |
          docker push \
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}

      - name: Tag Latest (Production Only)
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag \
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }} \
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

          docker push \
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest


  deploy-uat:
    name: Deploy to UAT
    needs: docker-build-push
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/uat' && github.event_name == 'push'

    steps:
      - name: Deploy UAT Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.UAT_SERVER_HOST }}
          username: ${{ secrets.UAT_SERVER_USER }}
          key: ${{ secrets.UAT_SERVER_SSH_KEY }}
          script: |
            cd /opt/myapp
            docker compose pull
            docker compose up -d
            docker image prune -af


  deploy-prod:
    name: Deploy to Production
    needs: docker-build-push
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy Production Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          script: |
            cd /opt/myapp
            docker compose pull
            docker compose up -d
            docker image prune -af