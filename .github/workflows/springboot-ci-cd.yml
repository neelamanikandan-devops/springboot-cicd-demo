name: Enterprise CI-CD Pipeline

on:
  push:
    branches:
      - develop
      - uat
      - main
  pull_request:
    branches:
      - develop
      - uat
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven

      - name: Run JUnit Tests
        run: mvn clean test

      - name: Build JAR
        run: mvn clean package -DskipTests

      # 📦 UPLOAD ARTIFACT (IMPORTANT ADDITION)
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  sonar-analysis:
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: SonarQube Scan
        run: mvn sonar:sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  compliance-check:
    needs: sonar-analysis
    runs-on: ubuntu-latest

    steps:
      - name: Compliance Gate
        run: |
          echo "Running compliance checks..."
          echo "Checking licenses..."
          echo "Checking vulnerabilities..."
          echo "Checking code standards..."

  docker-build:
    needs: compliance-check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/uat' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 📥 DOWNLOAD ARTIFACT (IMPORTANT ADDITION)
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Docker Image
        run: |
          TAG=${GITHUB_REF_NAME}-${GITHUB_SHA::7}

          docker build -t ${{ secrets.DOCKER_USERNAME }}/my-app:$TAG .
          docker push ${{ secrets.DOCKER_USERNAME }}/my-app:$TAG

          if [ "$GITHUB_REF_NAME" = "main" ]; then
            docker tag ${{ secrets.DOCKER_USERNAME }}/my-app:$TAG ${{ secrets.DOCKER_USERNAME }}/my-app:latest
            docker push ${{ secrets.DOCKER_USERNAME }}/my-app:latest
          fi