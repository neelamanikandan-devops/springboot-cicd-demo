name: Enterprise CI-CD Pipeline

on:
  push:
    branches:
      - uat
      - main

  pull_request:
    branches:
      - uat
      - main


jobs:

  build-test-sonar:
    name: Build Test Sonar
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - run: mvn clean verify

      - run: |
          mvn sonar:sonar \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.java.binaries=target/classes

      - uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar


  compliance-check:
    name: Compliance Gate
    needs: build-test-sonar
    runs-on: ubuntu-latest

    steps:
      - run: echo "Compliance passed"


  docker-build-push:
    name: Docker Build and Push
    needs: compliance-check
    runs-on: ubuntu-latest

    if: github.event_name == 'push'

    outputs:
      tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - id: tag
        run: echo "tag=${GITHUB_REF_NAME}-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/my-app:${{ steps.tag.outputs.tag }} .

      - run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/my-app:${{ steps.tag.outputs.tag }}

      - if: github.ref == 'refs/heads/main'
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/my-app:${{ steps.tag.outputs.tag }} \
                     ${{ secrets.DOCKER_USERNAME }}/my-app:latest

          docker push ${{ secrets.DOCKER_USERNAME }}/my-app:latest


  deploy-uat:
    name: Deploy to UAT
    needs: docker-build-push
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/uat' && github.event_name == 'push'

    steps:
      - name: Deploy UAT Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.UAT_SERVER_HOST }}
          username: ${{ secrets.UAT_SERVER_USER }}
          key: ${{ secrets.UAT_SERVER_SSH_KEY }}
          script: |
            cd /opt/myapp
            docker compose pull
            docker compose up -d
            docker image prune -af


  deploy-prod:
    name: Deploy to Production
    needs: docker-build-push
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy Production Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          script: |
            cd /opt/myapp
            docker compose pull
            docker compose up -d
            docker image prune -af