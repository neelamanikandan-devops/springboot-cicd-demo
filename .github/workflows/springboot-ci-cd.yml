name: Enterprise CI-CD Pipeline

on:
  push:
    branches:
      - uat
      - main

  pull_request:
    branches:
      - uat
      - main

jobs:

  build-test-sonar:
    name: Build Test Sonar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Debug Context
        run: |
          echo "EVENT=${GITHUB_EVENT_NAME}"
          echo "REF=${GITHUB_REF}"
          echo "REF_NAME=${GITHUB_REF_NAME}"

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build, Test and Package
        run: mvn clean verify

      - name: SonarQube Analysis
        run: |
          mvn sonar:sonar \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.java.binaries=target/classes

      - name: Upload Application Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 7

  compliance-check:
    name: Compliance Gate
    needs: build-test-sonar
    runs-on: ubuntu-latest

    steps:
      - name: Compliance Validation
        run: |
          echo "Running compliance checks..."
          echo "License validation passed"
          echo "Dependency validation passed"
          echo "Code quality validation passed"

  docker-build-push:
    name: Docker Build and Push
    needs: compliance-check
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'push' &&
      (
        github.ref == 'refs/heads/uat' ||
        github.ref == 'refs/heads/main'
      )

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Download Application Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target

      - name: Verify Artifact
        run: |
          ls -la target

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate Image Tag
        run: |
          echo "TAG=${GITHUB_REF_NAME}-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/my-app:${TAG} .

      - name: Push Docker Image
        run: |
          docker push \
            ${{ secrets.DOCKER_USERNAME }}/my-app:${TAG}

      - name: Tag Latest for Production
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag \
            ${{ secrets.DOCKER_USERNAME }}/my-app:${TAG} \
            ${{ secrets.DOCKER_USERNAME }}/my-app:latest

          docker push \
            ${{ secrets.DOCKER_USERNAME }}/my-app:latest