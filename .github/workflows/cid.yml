name: Spring Boot CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:

# ---------------- BUILD ----------------
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Maven
        run: mvn -v

      - name: Build (Compile)
        run: mvn clean compile


# ---------------- UNIT TEST ----------------
  test:
    runs-on: self-hosted
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unit Test
        run: mvn test


# ---------------- SONARQUBE ----------------
  sonar:
    runs-on: self-hosted
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SonarQube Analysis
        run: |
          mvn clean verify sonar:sonar ^
          -Dsonar.projectKey=springboot-cicd-demo ^
          -Dsonar.host.url=http://localhost:9000 ^
          -Dsonar.token=sqa_5ea45c2276d7a49ddd7f07eb862fe36feeb7a4af


# ---------------- PACKAGE ----------------
  package:
    runs-on: self-hosted
    needs: sonar

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Package Jar
        run: mvn clean package -DskipTests


# ---------------- DEPLOY UAT ----------------
  deploy-uat:
    runs-on: self-hosted
    needs: package

    steps:
      - name: Stop existing UAT app & start new one
        run: |
          for /f "tokens=2" %%i in ('wmic process where "CommandLine like '%%CI-CD-DEVOPS%%'" get ProcessId ^| findstr [0-9]') do (
              taskkill /F /PID %%i
          )

          start /B java -jar "%GITHUB_WORKSPACE%\target\CI-CD-DEVOPS-0.0.1-SNAPSHOT.jar" > C:\uat.log 2>&1

          echo UAT Deployment Completed


# ---------------- APPROVAL ----------------
  approval:
    runs-on: ubuntu-latest
    needs: deploy-uat

    steps:
      - name: Manual Approval Gate
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.token }}
          approvers: your-github-username
          minimum-approvals: 1
          issue-title: "Deploy to Production Approval Required"
          issue-body: "Approve or reject production deployment"


# ---------------- DEPLOY PRODUCTION ----------------
  deploy-prod:
    runs-on: self-hosted
    needs: approval

    steps:
      - name: Deploy to Production
        run: |
          copy target\*.jar C:\deploy\PROD\CI-CD-DEVOPS-0.0.1-SNAPSHOT.jar
          echo Production Deployment Completed
